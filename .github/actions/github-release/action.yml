name: GitHub release
description: Tag the current commit and create a GitHub release.

inputs:
  version:
    description: "Release version/tag. If empty, derived from the release/<version> branch name."
    required: false
    default: ""
  changelog_file:
    description: "Optional path to a file used as release body."
    required: false
    default: ""
  generate_release_notes:
    description: "Let GitHub auto-generate release notes from commits."
    required: false
    default: "false"
  target_commitish:
    description: "Commit SHA to tag."
    required: false
    default: ${{ github.sha }}
  github_token:
    description: "Token with contents: write permission."
    required: true
  draft:
    required: true
    default: false

runs:
  using: composite
  steps:
    - id: ver
      shell: pwsh
      run: |
        $v = '${{ inputs.version }}'
        if (-not $v) {
          $v = $env:GITHUB_REF_NAME -replace '^release/',''
        }
        if (-not $v) { Write-Host "::error::could not determine version"; exit 1 }
        "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

    - uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ steps.ver.outputs.version }}
        name: ${{ steps.ver.outputs.version }}
        target_commitish: ${{ inputs.target_commitish }}
        body_path: ${{ inputs.changelog_file }}
        generate_release_notes: ${{ inputs.generate_release_notes }}
        draft: ${{ inputs.draft }}
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
