name: Source Release

# Reusable workflow that packages and ships a customer-facing source zip as part of
# a release. Callers invoke it on a push to a release/* branch, deriving the version
# from the branch name and passing it as `version`, so the source zip ships alongside
# the rest of the release. Driven by an allow-list of customer-facing csproj paths
# in the caller repo; uses scripts/source-release/stage.sh from build-common
# (consumed via the caller's submodule pin) to enumerate source files via
# MSBuild and stage them, then scans, zips, verifies the zip builds, and
# optionally uploads it to Release Manager as a `generic` artifact
# (PUT /api/upload/<product>/<version>/generic/<filename>).
#
# Callers must check out build-common (typically as a submodule at the
# repository root) at a SHA that includes scripts/source-release/stage.sh.

on:
    workflow_call:
        inputs:
            project_name:
                description: >-
                    Customer-facing project name. Used as the staged
                    directory name prefix (e.g. "Avalonia.Controls.TreeDataGrid"
                    yields "Avalonia.Controls.TreeDataGrid-1.2.3") and the zip
                    filename.
                required: true
                type: string
            allow_list:
                description: >-
                    Path (relative to the caller's repo root) to the text file
                    listing customer-facing csproj paths to include. One path
                    per line; blank lines and `#` comments allowed.
                required: false
                type: string
                default: .github/source-release/projects.txt
            solution_file:
                description: >-
                    Filename of the .slnx at the caller's repo root to mirror
                    into the customer zip. The staged solution reuses this
                    filename and references only the allow-listed projects.
                    When unset, the stager picks the first .slnx at the repo
                    root (filesystem order) — fine for repos with a single
                    .slnx, but ambiguous otherwise. Set explicitly when the
                    repo has multiple .slnx files (e.g. a `*.ci.slnx`).
                required: false
                type: string
                default: ""
            version:
                description: >-
                    Version to package (no leading `v`). Callers derive it from
                    the release/* branch name and pass it here; it takes
                    precedence over `github.event.release.tag_name`. Also used by
                    `workflow_dispatch` runs and for repackaging historic releases.
                required: false
                type: string
                default: ""
            ref:
                description: >-
                    Git commitish (branch, tag, or SHA) to check out before
                    staging. When empty, uses the ref that triggered the
                    workflow. Intended for repackaging historic releases via
                    `workflow_dispatch`.
                required: false
                type: string
                default: ""
            upload:
                description: >-
                    Whether to upload the zip to Release Manager. Defaults to
                    false so callers must opt in explicitly — callers pass `true`
                    on a release/* branch push (the release path) and gate it
                    behind a checkbox for `workflow_dispatch` test runs.
                required: false
                type: boolean
                default: false
            release_manager_base_url:
                description: >-
                    Base URL of the Release Manager instance, e.g.
                    `https://release-manager.example.com` (no trailing path).
                    The artifact is PUT to
                    `<base>/api/upload/<product>/<version>/generic/<zip_name>`.
                    Required when `upload` is true.
                required: false
                type: string
                default: ""
            release_manager_product:
                description: >-
                    Release Manager product slug (lowercase alphanumeric +
                    hyphens) the artifact is published under. Required when
                    `upload` is true.
                required: false
                type: string
                default: ""
            dotnet_sdk:
                description: .NET SDK version. Must be 9.0+ for `dotnet msbuild -getItem/-getProperty`.
                required: false
                type: string
                default: 9.0.x
            runs_on:
                description: >-
                    Runner for the staging and verify-build jobs. Defaults to
                    `ubuntu-latest`. Set to `macos-latest` for libraries with
                    mobile (iOS/Android) target frameworks: on Linux those TFMs
                    are commonly dropped, so their sources would neither be
                    staged nor verified — a macOS agent stages and builds them.
                required: false
                type: string
                default: ubuntu-latest
            install_workloads:
                description: >-
                    Space-separated .NET workloads to install before staging and
                    verify-build (e.g. `android ios`). Required, together with a
                    macOS `runs_on`, to stage and verify mobile target frameworks.
                required: false
                type: string
                default: ""
        secrets:
            checkout_token:
                description: PAT with access to private submodules.
                required: true
            license_key:
                description: >-
                    Avalonia license key used by the verify-build job. The
                    zip must build with a real license, so this is required.
                required: true
            release_manager_api_key:
                description: >-
                    Release Manager API key (sent as `Authorization: Bearer`).
                    Required when `upload` is true.
                required: false

jobs:

    package:
        name: Scan & package source zip
        runs-on: ${{ inputs.runs_on }}
        outputs:
            version: ${{ steps.version.outputs.version }}
            zip_name: ${{ steps.version.outputs.zip_name }}
            dir_name: ${{ steps.version.outputs.dir_name }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  submodules: recursive
                  token: ${{ secrets.checkout_token }}
                  ref: ${{ inputs.ref }}

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: ${{ inputs.dotnet_sdk }}

            - name: Install .NET workloads
              if: ${{ inputs.install_workloads != '' }}
              shell: bash
              run: dotnet workload install ${{ inputs.install_workloads }}

            - name: Resolve version
              id: version
              shell: bash
              env:
                  PROJECT_NAME: ${{ inputs.project_name }}
                  EXPLICIT_VERSION: ${{ inputs.version }}
                  RAW_TAG: ${{ github.event.release.tag_name }}
              run: |
                  set -euo pipefail
                  if [[ -n "$EXPLICIT_VERSION" ]]; then
                      source="input version='${EXPLICIT_VERSION}'"
                      version="${EXPLICIT_VERSION#v}"
                  elif [[ -n "$RAW_TAG" ]]; then
                      source="release tag '${RAW_TAG}'"
                      version="${RAW_TAG#v}"
                  else
                      echo "::error::No version available — neither inputs.version nor github.event.release.tag_name is set." >&2
                      exit 1
                  fi
                  if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
                      echo "::error::${source} does not match expected version format (MAJOR.MINOR.PATCH[-suffix])."
                      exit 1
                  fi
                  dir_name="${PROJECT_NAME}-${version}"
                  zip_name="${dir_name}.zip"
                  echo "version=${version}" >> "$GITHUB_OUTPUT"
                  echo "dir_name=${dir_name}" >> "$GITHUB_OUTPUT"
                  echo "zip_name=${zip_name}" >> "$GITHUB_OUTPUT"
                  echo "Resolved version: ${version} (from ${source})"

            - name: Verify staging script is present
              shell: bash
              run: |
                  set -euo pipefail
                  script="$GITHUB_WORKSPACE/build-common/scripts/source-release/stage.sh"
                  if [[ ! -f "$script" ]]; then
                      echo "::error::Expected staging script not found at build-common/scripts/source-release/stage.sh. Bump your build-common submodule pin to a commit that includes it." >&2
                      exit 1
                  fi

            - name: Stage source via MSBuild
              shell: bash
              run: |
                  set -euo pipefail
                  staging_root="${RUNNER_TEMP}/staging"
                  staging_dir="${staging_root}/${{ steps.version.outputs.dir_name }}"
                  bash "$GITHUB_WORKSPACE/build-common/scripts/source-release/stage.sh" \
                      "$GITHUB_WORKSPACE" \
                      "${{ inputs.allow_list }}" \
                      "$staging_dir" \
                      "${{ inputs.solution_file }}"
                  echo "staging_dir=${staging_dir}" >> "$GITHUB_ENV"
                  echo "staging_root=${staging_root}" >> "$GITHUB_ENV"

            - name: Scan staged source for secrets
              shell: bash
              run: |
                  set -euo pipefail
                  echo "Scanning $staging_dir for secrets..."

                  fail=0

                  # Online Avalonia license keys: avln_on_key:v1:<32 hex>
                  matches=$(grep -RInE --binary-files=without-match \
                      'avln_on_key:v1:[A-Fa-f0-9]{32}' "$staging_dir" || true)
                  if [[ -n "$matches" ]]; then
                      echo "::error::Online Avalonia license key(s) found:"
                      echo "$matches"
                      fail=1
                  fi

                  # Offline Avalonia license keys: avln_off_key:v1:<base64>:<base64>
                  matches=$(grep -RInE --binary-files=without-match \
                      'avln_off_key:v1:[A-Za-z0-9+/=]+:[A-Za-z0-9+/=]+' "$staging_dir" || true)
                  if [[ -n "$matches" ]]; then
                      echo "::error::Offline Avalonia license key(s) found:"
                      echo "$matches"
                      fail=1
                  fi

                  # nuget.config files should never be in the staged tree — they
                  # aren't in any csproj item list and aren't imported as MSBuild
                  # files, so the MSBuild-driven stage won't include them. Presence
                  # here would mean the stage script regressed.
                  nuget_files=$(find "$staging_dir" -type f -iname 'nuget.config' || true)
                  if [[ -n "$nuget_files" ]]; then
                      echo "::error::nuget.config file(s) leaked into staging directory:"
                      echo "$nuget_files"
                      fail=1
                  fi

                  # Belt-and-braces: any package-source-credential markers anywhere.
                  matches=$(grep -RInE --binary-files=without-match \
                      -e '<packageSourceCredentials' \
                      -e 'ClearTextPassword' \
                      -e '<Password\b' \
                      "$staging_dir" || true)
                  if [[ -n "$matches" ]]; then
                      echo "::error::Possible NuGet credential markers found:"
                      echo "$matches"
                      fail=1
                  fi

                  if [[ "$fail" -ne 0 ]]; then
                      exit 1
                  fi
                  echo "No secrets found."

            - name: Create zip
              shell: bash
              run: |
                  set -euo pipefail
                  cd "$staging_root"
                  zip -r "${RUNNER_TEMP}/${{ steps.version.outputs.zip_name }}" \
                      "${{ steps.version.outputs.dir_name }}"
                  ls -la "${RUNNER_TEMP}/${{ steps.version.outputs.zip_name }}"

            - name: Upload zip artifact
              uses: actions/upload-artifact@v4
              with:
                  name: source-zip
                  path: ${{ runner.temp }}/${{ steps.version.outputs.zip_name }}
                  if-no-files-found: error

    verify-build:
        name: Verify zip is buildable
        needs: package
        runs-on: ${{ inputs.runs_on }}
        steps:
            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: ${{ inputs.dotnet_sdk }}

            - name: Install .NET workloads
              if: ${{ inputs.install_workloads != '' }}
              shell: bash
              run: dotnet workload install ${{ inputs.install_workloads }}

            - name: Download source zip
              uses: actions/download-artifact@v4
              with:
                  name: source-zip
                  path: ${{ runner.temp }}/zip

            - name: Extract zip
              shell: bash
              run: |
                  set -euo pipefail
                  mkdir -p "${RUNNER_TEMP}/extracted"
                  unzip -q "${RUNNER_TEMP}/zip/${{ needs.package.outputs.zip_name }}" \
                      -d "${RUNNER_TEMP}/extracted"
                  ls -la "${RUNNER_TEMP}/extracted/${{ needs.package.outputs.dir_name }}"

            - name: Build extracted source
              env:
                  AVALONIA_LICENSE_KEY: ${{ secrets.license_key }}
              shell: bash
              run: |
                  set -euo pipefail
                  cd "${RUNNER_TEMP}/extracted/${{ needs.package.outputs.dir_name }}"
                  slnx=$(find . -maxdepth 1 -name '*.slnx' -print -quit)
                  if [[ -z "$slnx" ]]; then
                      echo "::error::No .slnx found at the root of the extracted zip." >&2
                      exit 1
                  fi
                  dotnet build "$slnx" -c Release

    upload:
        name: Upload zip to Release Manager
        needs: [package, verify-build]
        if: ${{ inputs.upload }}
        runs-on: ubuntu-latest
        steps:
            - name: Validate upload config
              shell: bash
              env:
                  RM_BASE_URL: ${{ inputs.release_manager_base_url }}
                  RM_PRODUCT: ${{ inputs.release_manager_product }}
                  RM_API_KEY: ${{ secrets.release_manager_api_key }}
              run: |
                  set -euo pipefail
                  missing=()
                  [[ -z "$RM_BASE_URL" ]] && missing+=(release_manager_base_url)
                  [[ -z "$RM_PRODUCT"  ]] && missing+=(release_manager_product)
                  [[ -z "$RM_API_KEY"  ]] && missing+=(release_manager_api_key)
                  if (( ${#missing[@]} > 0 )); then
                      echo "::error::upload is true but required config missing: ${missing[*]}" >&2
                      exit 1
                  fi

            - name: Download source zip
              uses: actions/download-artifact@v4
              with:
                  name: source-zip
                  path: ${{ runner.temp }}/zip

            - name: Upload to Release Manager
              shell: bash
              env:
                  RM_BASE_URL: ${{ inputs.release_manager_base_url }}
                  RM_PRODUCT: ${{ inputs.release_manager_product }}
                  RM_API_KEY: ${{ secrets.release_manager_api_key }}
                  ZIP_NAME: ${{ needs.package.outputs.zip_name }}
                  VERSION: ${{ needs.package.outputs.version }}
              run: |
                  set -euo pipefail
                  zip_path="${RUNNER_TEMP}/zip/${ZIP_NAME}"
                  base_url="${RM_BASE_URL%/}"
                  # The generic-artifact *filename* is Release Manager's stable
                  # identifier for the artifact within a product, so it is the
                  # fixed literal `source.zip` — version-independent (the version
                  # already lives in the URL path) and the same across every repo.
                  # A versioned or per-project filename would register a brand-new
                  # artifact identity for every release. Upload the (versioned)
                  # zip on disk under this version-independent name.
                  artifact_name="source.zip"
                  # PUT <base>/api/upload/<product>/<version>/generic/<filename>  (web-api §13.2)
                  upload_url="${base_url}/api/upload/${RM_PRODUCT}/${VERSION}/generic/${artifact_name}"

                  echo "Uploading ${ZIP_NAME} as ${artifact_name} (version ${VERSION}) to ${upload_url}"
                  http_code=$(curl -sS -o "${RUNNER_TEMP}/rm_response.json" -w '%{http_code}' \
                      -X PUT \
                      -H "Authorization: Bearer ${RM_API_KEY}" \
                      -H "Content-Type: application/octet-stream" \
                      --data-binary "@${zip_path}" \
                      "$upload_url")

                  echo "Release Manager responded HTTP ${http_code}"
                  cat "${RUNNER_TEMP}/rm_response.json" 2>/dev/null || true
                  echo
                  # 201 Created on first upload, 200 OK on overwrite.
                  if [[ "$http_code" != "200" && "$http_code" != "201" ]]; then
                      echo "::error::Release Manager upload failed with HTTP ${http_code}." >&2
                      exit 1
                  fi

                  {
                      echo "### Source zip uploaded to Release Manager"
                      echo ""
                      echo "- **Version:** \`${VERSION}\`"
                      echo "- **Product:** \`${RM_PRODUCT}\`"
                      echo "- **Artifact:** \`${artifact_name}\` (generic)"
                      echo "- **Endpoint:** \`${upload_url}\`"
                  } >> "$GITHUB_STEP_SUMMARY"
